<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spam Checker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>Spam Checker</h1>
      <p class="tagline">Paste an email below and check if it's spam.</p>

      <div class="form">
        <label for="subject">Subject</label>
        <input type="text" id="subject" placeholder="e.g. You have won $1,000,000!!">

        <label for="body">Email body</label>
        <textarea id="body" rows="7" placeholder="Paste the email content here..."></textarea>

        <div class="actions">
          <button id="btn-check">Check email</button>
          <button id="btn-clear" class="secondary">Clear</button>
        </div>
      </div>

      <div id="result" class="result hidden"></div>

      <div id="signals" class="signals hidden">
        <p class="signals-title">Why it was flagged:</p>
        <ul id="signals-list"></ul>
      </div>

      <div class="samples">
        <p>Try a sample:</p>
        <div id="sample-btns"></div>
      </div>

      <div id="history" class="history hidden">
        <p>Recent checks</p>
        <table id="history-table">
          <thead>
            <tr>
              <th>Subject</th>
              <th>Result</th>
              <th>Confidence</th>
            </tr>
          </thead>
          <tbody id="history-body"></tbody>
        </table>
      </div>

      <p id="api-notice" class="api-notice hidden">
        Note: backend not running at localhost:5000 — using fallback model.
      </p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
